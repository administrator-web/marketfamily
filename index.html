<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#e31b23" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<title>🛒 Súper Lista Familiar</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.svg">
<link rel="icon" href="/icon-192.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#e31b23;
    --primary-dark:#c2171d;
    --success:#22c55e;
    --danger:#ef4444;
    --bg:#f3f4f6;
    --card:#ffffff;
    --text:#111827;
    --muted:#6b7280;
    --shadow: 0 10px 30px rgba(0,0,0,.08), 0 2px 10px rgba(0,0,0,.05);
}

html{
    scroll-behavior:smooth;
    -webkit-tap-highlight-color:transparent;
}

body{
    overscroll-behavior-y:none;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    transition:
        background-color .2s ease,
        border-color .2s ease,
        transform .15s ease,
        opacity .2s ease;
}

body{
    font-family:'Inter',sans-serif;
    background: linear-gradient(180deg, #fff 0%, #f5f5f5 100%);
    color:var(--text);
    min-height:100vh;
    padding:12px; /* Reducido para arañar espacio en pantallas chicas */
}

button, input, select{
    font-family:'Inter',sans-serif;
}

.container{
    max-width:700px;
    margin:auto;
    background: white;
    box-shadow:var(--shadow);
    border-radius:24px;
    overflow:hidden;
    border: 1px solid #e5e7eb;
}

.header{
    position:sticky;
    top:0;
    z-index:100;

    padding:20px 16px 18px;

    background:
        linear-gradient(
            135deg,
            var(--primary),
            #ff4b4b
        );

    color:white;

    text-align:center;

    backdrop-filter:blur(12px);
}

.header h1{ font-size:24px; font-weight:800; }
.header p{ margin-top:4px; opacity:.9; font-size: 13px;}

.content{ padding:16px; }

/* Tarjetas de Reporte Rápido Responsivas */
.stats{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:8px;
    margin-bottom:20px;
}

.stat-card{
    background:#f9fafb;
    border-radius:14px;
    padding:10px 6px;
    border: 1px solid #e5e7eb;
    text-align:center;
}

.stat-card h3{ font-size:11px; color:var(--muted); margin-bottom:4px; text-transform: uppercase; font-weight:700;}
.stat-card span{ font-size:16px; font-weight:800; color: var(--text); word-break: break-all;}
.stat-card .highlight { color: var(--primary); }

/* Panel de Entrada Mejorado (Súper adaptable) */
.input-panel {
    background: #f9fafb;
    padding: 14px;
    border-radius: 16px;
    border: 1px solid #e5e7eb;
    margin-bottom: 16px;
}

.input-row {
    display: flex;
    flex-wrap: wrap; /* Permite bajar si no cabe */
    gap: 10px;
    margin-bottom: 10px;
}

.input-row:last-child {
    margin-bottom: 0;
}

.input-row input,
.input-row select{
    border:2px solid #e5e7eb;

    padding:14px;

    border-radius:14px;

    font-size:15px;

    outline:none;

    background:white;

    color:#111827;

    font-weight:500;

    flex:1 1 150px;

    box-shadow:
        inset 0 1px 2px rgba(0,0,0,.03);
}

#itemInput { 
    flex: 2 1 200px; /* Toma prioridad de ancho */
}

.input-row input:focus, .input-row select:focus { border-color: var(--primary); }

.add-btn{
    border:none;
    background:var(--primary);
    color:white;
    padding: 14px;
    border-radius:12px;
    font-size:15px;
    font-weight: 700;
    cursor:pointer;
    transition:.2s;
    width: 100%;
}
.add-btn:hover{ background:var(--primary-dark); }

button:active{
    transform:scale(.97);
}

.search-box input {
    width: 100%;
    border: 2px solid #e5e7eb;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    margin-bottom: 16px;
    outline: none;
}

.list{ display:flex; flex-direction:column; gap:12px; }
.empty{ text-align:center; padding:30px 20px; color:var(--muted); font-size: 14px; }

/* Caja de Producto adaptable */
.item{
    background:white;

    border-radius:20px;

    padding:14px;

    display:flex;

    flex-direction:column;

    gap:12px;

    border:1px solid #e5e7eb;

    box-shadow:
        0 4px 12px rgba(0,0,0,.04);

    animation:itemFade .2s ease;
}

@keyframes itemFade{
    from{
        opacity:0;
        transform:translateY(8px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.item.bought {
    background: #f0fdf4;
    border-color: #bbf7d0;
}
.item.bought .item-name {
    text-decoration: line-through;
    color: var(--muted);
}

.item-top{ display:flex; align-items:center; gap:12px; }
.checkbox{ width:22px; height:22px; cursor:pointer; accent-color: var(--success); flex-shrink: 0; }
.item-name{ font-size:16px; font-weight:600; flex:1; word-break: break-word; }

/* Grid de cálculos ajustable para móviles */
.item-calc-area {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(75px, 1fr));
    gap: 8px;
    align-items: center;
    background: #f9fafb;
    padding: 10px;
    border-radius: 12px;
}

.calc-box {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.calc-box label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
}

.calc-box input {
    width: 100%;
    padding: 8px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    text-align: center;
}

.item-subtotal {
    text-align: right;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    flex-direction: column;
    grid-column: span 1;
}

/* En pantallas muy pequeñas, forzamos que el subtotal ocupe su propia línea final en el mini-grid */
@media (max-width: 360px) {
    .item-calc-area {
        grid-template-columns: 1fr 1fr;
    }
    .item-subtotal {
        grid-column: span 2;
        text-align: center;
        border-top: 1px dashed #d1d5db;
        padding-top: 6px;
        margin-top: 4px;
    }
}

.item-actions {
    display: flex;
    justify-content: flex-end;
}

.delete-btn{
    border:none;
    background: transparent;
    color:var(--danger);
    cursor:pointer;
    font-weight:600;
    font-size: 13px;
    padding: 2px 6px;
}

.footer{
    margin-top:20px;
    background:#fdf2f2;
    border:1px solid #fde2e2;
    padding:16px;
    border-radius:16px;
    display:flex;
    flex-direction: column;
    gap:12px;
}

.footer-main {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.footer strong{ font-size:22px; color:var(--primary); }

.progress{ height:8px; background:#e5e7eb; border-radius:999px; overflow:hidden; }
.progress-bar{ height:100%; width:0%; background: var(--success); transition:.3s; }

/* Botones de acción inferiores */
.actions{ margin-top:16px; display:grid; grid-template-columns:1fr; gap:10px; }
.action-btn{ border:none; padding:14px; border-radius:12px; cursor:pointer; font-weight:700; color:white; font-size: 14px;}
.whatsapp{ background:#25D366; }
.export{ background:#111827; }
.install{ background:var(--primary); display:none; }
.clear{ background:#ef4444; }

/* Ajustes para pantallas medianas (Tabletas o pantallas más anchas) */
@media (min-width: 480px) {
    .actions { grid-template-columns: repeat(3, 1fr); }
    .clear { grid-column: 1 / -1; }
    .stat-card { padding: 14px; }
    .stat-card span { font-size: 20px; }
}

.toast{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
    background:rgba(15,23,42,.95); color:white; padding:10px 20px;
    border-radius:999px; opacity:0; pointer-events:none; transition: opacity 0.2s; z-index:999;
    font-size: 14px; text-align: center; width: 80%; max-width: 300px;
}
.toast.show{ opacity:1; }
#shareModal{
    position:fixed;
    inset:0;
    background:rgba(15,23,42,.72);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:16px;
}

#shareModal.show{ display:flex; }

.modal-card{
    width:min(720px, 100%);
    background:var(--card);
    color:var(--text);
    border-radius:20px;
    box-shadow:var(--shadow);
    border:1px solid #e5e7eb;
    overflow:hidden;
}

.modal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:16px 18px;
    border-bottom:1px solid #e5e7eb;
    background:linear-gradient(135deg, rgba(227,27,35,.08), rgba(227,27,35,.02));
}

.modal-header h2{
    font-size:16px;
    font-weight:800;
}

.modal-body{
    padding:16px 18px 18px;
}

.modal-preview{
    width:100%;
    min-height:320px;
    resize:vertical;
    border:1px solid #d1d5db;
    border-radius:14px;
    padding:14px;
    font: inherit;
    line-height:1.5;
    background:#f9fafb;
    color:var(--text);
}

.modal-actions{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin-top:14px;
}

.modal-actions .action-btn{
    width:100%;
}

.close-modal{
    border:none;
    background:transparent;
    color:var(--muted);
    font-size:28px;
    line-height:1;
    cursor:pointer;
    padding:0 4px;
}

@media (min-width: 480px) {
    .modal-actions{
        grid-template-columns: repeat(3, 1fr);
    }
}

#fabButton{
    position:fixed;

    right:20px;
    bottom:20px;

    width:64px;
    height:64px;

    border:none;

    border-radius:50%;

    background:var(--primary);

    color:white;

    font-size:34px;

    font-weight:700;

    box-shadow:
        0 10px 25px rgba(227,27,35,.35);

    z-index:999;

    display:none;
}

@media(max-width:640px){

    #fabButton{
        display:block;
    }

}
/* Modo Oscuro Automático */
@media (prefers-color-scheme: dark){
    body{ background:#0f172a; color:white; }
    .container{ background:#1e293b; border-color:#334155; }
    .stat-card, .input-panel, .item-calc-area{ background:#111827; border-color:#334155; }
    .stat-card span, .item-subtotal { color: white; }
    .input-row input, .input-row select, .search-box input, .calc-box input{ background:#1f2937; color:white; border-color:#4b5563; }
    .item { background:#1e293b; border-color:#334155; }
    .item.bought { background: #064e3b; border-color: #047857; }
    .footer { background: #271c1c; border-color: #4c1d1d; }
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🛒 Súper Lista Familiar</h1>
        <p>Precios claros, cuentas exactas sin sorpresas</p>
    </div>

    <div class="content">
        <div class="stats">
            <div class="stat-card">
                <h3>Artículos</h3>
                <span id="itemCount">0</span>
            </div>
            <div class="stat-card">
                <h3>Comprados</h3>
                <span id="boughtCount" class="highlight">0</span>
            </div>
            <div class="stat-card">
                <h3>Carrito</h3>
                <span>C$ <span id="totalPrice">0.00</span></span>
            </div>
        </div>

        <div class="input-panel">
            <div class="input-row">
                <input type="text" id="itemInput" list="productsList" placeholder="Ej: Pollo, Leche, Jabón..." autocomplete="off">
                <datalist id="productsList"></datalist>
                <select id="inputType">
                    <option value="unidades">Uds (Unidades)</option>
                    <option value="libras">Lbs (Libras)</option>
                </select>
            </div>
            <div class="input-row">
                <button class="add-btn" id="addBtn">➕ Agregar a la Lista</button>
            </div>
        </div>

        <div class="search-box">
            <input type="search" id="searchInput" placeholder="🔍 Buscar en la lista de hoy...">
        </div>

        <div class="list" id="shoppingList"></div>

        <div class="footer">
            <div class="footer-main">
                <div>
                    <div style="font-size: 13px; color: var(--muted); font-weight: bold;">TOTAL ESTIMADO</div>
                    <strong>C$ <span id="footerTotal">0.00</span></strong>
                </div>
            </div>
            <div>
                <div style="margin-bottom:6px; font-size: 12px; color: var(--muted);">Progreso del Carrito</div>
                <div class="progress">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="action-btn install" id="installBtn">📲 Instalar app</button>
            <button class="action-btn whatsapp" id="shareBtn">📲 Ver y enviar por WhatsApp</button>
            <button class="action-btn export" id="exportBtn">💾 Respaldar Lista (JSON)</button>
            <div style="position:relative;">
                <button class="action-btn export" style="width:100%;">📂 Cargar Respaldo (JSON)</button>
                <input type="file" id="importFile" accept=".json" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
            </div>
            <button class="action-btn export" id="toggleBoughtBtn">👁️ Ocultar Comprados</button>
            <button class="action-btn clear" id="clearBtn">🧹 Vaciar Lista Completa</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>
<div id="shareModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="shareModalTitle">
        <div class="modal-header">
            <h2 id="shareModalTitle">Vista previa para WhatsApp</h2>
            <button class="close-modal" id="closeShareModal" aria-label="Cerrar vista previa">×</button>
        </div>
        <div class="modal-body">
            <textarea id="sharePreview" class="modal-preview" readonly></textarea>
            <div class="modal-actions">
                <button class="action-btn export" id="copyShareBtn">📋 Copiar texto</button>
                <button class="action-btn whatsapp" id="openWhatsappBtn">📲 Abrir WhatsApp</button>
                <button class="action-btn clear" id="closeShareBtn">Cerrar</button>
            </div>
        </div>
    </div>
</div>
<button id="fabButton">🛒</button>

<script>
const STORAGE_KEY = 'superListaFamiliar_v2';

// Lista base inicial por defecto si la memoria está vacía
const DEFAULT_PRODUCTS = [
    { name: 'Arroz', type: 'libras', price: 18.00, quantity: 5, bought: false },
    { name: 'Frijoles', type: 'libras', price: 32.00, quantity: 4, bought: false },
    { name: 'Leche en polvo', type: 'unidades', price: 160.00, quantity: 1, bought: false },
    { name: 'Aceite', type: 'unidades', price: 75.00, quantity: 2, bought: false },
    { name: 'Pollo entero', type: 'libras', price: 48.00, quantity: 6, bought: false }
];

const PRODUCT_SUGGESTIONS = [
    'Arroz',
    'Frijoles',
    'Aceite',
    'Azúcar',
    'Sal',
    'Pollo',
    'Huevos',
    'Leche',
    'Pan',
    'Tomate',
    'Cebolla',
    'Jabón',
    'Detergente',
    'Papel Higiénico'
];

let items;
try {
    const storedItems = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    items = Array.isArray(storedItems) ? storedItems : DEFAULT_PRODUCTS;
} catch {
    items = DEFAULT_PRODUCTS;
}
items = items.map(item => ({
    name: item.name,
    type: item.type,
    price: item.price,
    quantity: item.quantity,
    bought: Boolean(item.bought)
}));

const itemInput = document.getElementById('itemInput');
const inputType = document.getElementById('inputType');
const searchInput = document.getElementById('searchInput');
const shoppingList = document.getElementById('shoppingList');
const itemCount = document.getElementById('itemCount');
const boughtCount = document.getElementById('boughtCount');
const totalPrice = document.getElementById('totalPrice');
const footerTotal = document.getElementById('footerTotal');
const progressBar = document.getElementById('progressBar');
const toast = document.getElementById('toast');
const installBtn = document.getElementById('installBtn');
const shareModal = document.getElementById('shareModal');
const sharePreview = document.getElementById('sharePreview');
const copyShareBtn = document.getElementById('copyShareBtn');
const openWhatsappBtn = document.getElementById('openWhatsappBtn');
const closeShareBtn = document.getElementById('closeShareBtn');
const closeShareModal = document.getElementById('closeShareModal');
let toastTimer;
let hideBought = false;

function showToast(msg){
    navigator.vibrate?.(40);

    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=> toast.classList.remove('show'), 2000);
}

const datalist = document.getElementById('productsList');

PRODUCT_SUGGESTIONS.forEach(product => {
    const option = document.createElement('option');
    option.value = product;
    datalist.appendChild(option);
});

function saveItems(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

function formatCurrency(value){
    return `C$ ${Number(value || 0).toFixed(2)}`;
}

function buildWhatsappMessage(){
    const today = new Date().toLocaleDateString('es-NI', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });

    const totalItems = items.length;
    const boughtItems = items.filter(item => item.bought).length;
    const pendingItems = totalItems - boughtItems;
    const totalBought = items.reduce((acc, item) => {
        if(item.bought) return acc + ((parseFloat(item.price) || 0) * (parseFloat(item.quantity) || 0));
        return acc;
    }, 0);
    const totalEstimated = items.reduce((acc, item) => {
        return acc + ((parseFloat(item.price) || 0) * (parseFloat(item.quantity) || 0));
    }, 0);

    const completed = items.filter(item => item.bought);
    const pending = items.filter(item => !item.bought);

    let text = `🛒 *SÚPER LISTA FAMILIAR*\n`;
    text += `📅 ${today}\n\n`;
    text += `📊 *Resumen*\n`;
    text += `• Artículos: ${totalItems}\n`;
    text += `• Comprados: ${boughtItems}\n`;
    text += `• Pendientes: ${pendingItems}\n`;
    text += `• Total comprado: ${formatCurrency(totalBought)}\n`;
    text += `• Total estimado: ${formatCurrency(totalEstimated)}\n\n`;

    if(completed.length > 0){
        text += `✅ *Comprados*\n`;
        completed.forEach(item => {
            const price = parseFloat(item.price) || 0;
            const qty = parseFloat(item.quantity) || 0;
            const subtotal = price * qty;
            const unitLabel = item.type === 'libras' ? 'lb' : 'ud';

            text += `• ${item.name} - ${qty} ${unitLabel}`;
            if(price > 0){
                text += ` x ${formatCurrency(price)} = ${formatCurrency(subtotal)}`;
            }
            text += `\n`;
        });
        text += `\n`;
    }

    if(pending.length > 0){
        text += `⬜ *Pendientes*\n`;
        pending.forEach(item => {
            const price = parseFloat(item.price) || 0;
            const qty = parseFloat(item.quantity) || 0;
            const subtotal = price * qty;
            const unitLabel = item.type === 'libras' ? 'lb' : 'ud';

            text += `• ${item.name} - ${qty} ${unitLabel}`;
            if(price > 0){
                text += ` x ${formatCurrency(price)} = ${formatCurrency(subtotal)}`;
            } else {
                text += ` (sin precio)`;
            }
            text += `\n`;
        });
    }

    return text.trim();
}

function openShareModal(){
    if(items.length === 0){
        showToast('La lista está vacía');
        return;
    }

    sharePreview.value = buildWhatsappMessage();
    shareModal.classList.add('show');
    shareModal.setAttribute('aria-hidden', 'false');
}

function closeShareModalView(){
    shareModal.classList.remove('show');
    shareModal.setAttribute('aria-hidden', 'true');
}

function renderList(){
    shoppingList.innerHTML = '';
    const search = searchInput.value.trim().toLowerCase();
    const filtered = items.filter(item => {

        const matchesSearch =
            item.name
            .toLowerCase()
            .includes(search);

        const matchesBought =
            hideBought
                ? !item.bought
                : true;

        return matchesSearch && matchesBought;

    });

    if(filtered.length === 0){
        shoppingList.innerHTML = `<div class="empty">🫙 No hay artículos coincidentes</div>`;
        updateStats();
        return;
    }

    filtered.forEach(item => {
        const realIndex = items.indexOf(item);
        const div = document.createElement('div');
        div.className = `item ${item.bought ? 'bought' : ''}`;
        
        const labelMedida = item.type === 'libras' ? 'Precio Lb' : 'Precio Ud';
        const labelCantidad = item.type === 'libras' ? 'Lbs' : 'Cant';
        const subtotal = (parseFloat(item.price) || 0) * (parseFloat(item.quantity) || 0);

        div.innerHTML = `
            <div class="item-top">
                <input type="checkbox" class="checkbox" ${item.bought ? 'checked' : ''}>
                <div class="item-name">${item.name} <span style="font-size:11px; color:var(--muted); font-weight:normal;">(${item.type === 'libras' ? 'Lb' : 'Ud'})</span></div>
            </div>
            
            <div class="item-calc-area">
                <div class="calc-box">
                    <label>${labelMedida}</label>
                    <input type="number" class="price-input" value="${item.price || ''}" placeholder="0.00" step="0.01" min="0">
                </div>
                <div class="calc-box">
                    <label>${labelCantidad}</label>
                    <input type="number" class="qty-input" value="${item.quantity || '1'}" placeholder="1" step="0.01" min="0">
                </div>
                <div class="item-subtotal">
                    <span style="font-size:9px; color:var(--muted); font-weight:normal; text-transform:uppercase;">Subtotal</span>
                    C$ ${subtotal.toFixed(2)}
                </div>
            </div>

            <div class="item-actions">
                <button class="delete-btn">❌ Quitar</button>
            </div>
        `;

        div.querySelector('.checkbox').addEventListener('change', () => {
            items[realIndex].bought = !items[realIndex].bought;
            renderList();
        });

        div.querySelector('.price-input').addEventListener('input', (e) => {
            items[realIndex].price = e.target.value === '' ? '' : parseFloat(e.target.value);
            updateStats();
            saveItems();
        });
        
        div.querySelector('.price-input').addEventListener('blur', () => renderList());

        div.querySelector('.qty-input').addEventListener('input', (e) => {
            items[realIndex].quantity = e.target.value === '' ? '' : parseFloat(e.target.value);
            updateStats();
            saveItems();
        });
        
        div.querySelector('.qty-input').addEventListener('blur', () => renderList());

        div.querySelector('.delete-btn').addEventListener('click', () => {
            items.splice(realIndex, 1);
            renderList();
            showToast('Artículo eliminado');
        });

        shoppingList.appendChild(div);
    });

    updateStats();
    saveItems();
}

function updateStats(){
    const totalItems = items.length;
    const boughtItems = items.filter(i => i.bought).length;
    
    const totalCarrito = items.reduce((acc, item) => {
        if(item.bought) {
            return acc + ((parseFloat(item.price) || 0) * (parseFloat(item.quantity) || 0));
        }
        return acc;
    }, 0);

    const totalEstimadoCompleto = items.reduce((acc, item) => {
        return acc + ((parseFloat(item.price) || 0) * (parseFloat(item.quantity) || 0));
    }, 0);

    itemCount.textContent = totalItems;
    boughtCount.textContent = boughtItems;
    totalPrice.textContent = totalCarrito.toFixed(2);
    footerTotal.textContent = totalEstimadoCompleto.toFixed(2);

    const progress = totalItems === 0 ? 0 : (boughtItems / totalItems) * 100;
    progressBar.style.width = `${progress}%`;
}

function addItem(){
    const name = itemInput.value.trim();
    const type = inputType.value;

    if(name.length < 2){
        showToast('Escribe un nombre válido');
        return;
    }

    items.unshift({
        name: name,
        type: type,
        price: '',
        quantity: 1,
        bought: false
    });

    itemInput.value = '';
    renderList();
    showToast('¡Producto añadido!');
}

document.getElementById('addBtn').addEventListener('click', addItem);
itemInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') addItem(); });
searchInput.addEventListener('input', renderList);

document.getElementById('clearBtn').addEventListener('click', () => {
    if(items.length === 0) return;
    if(confirm('¿Seguro que quieres borrar toda la lista actual?')){
        items = [];
        renderList();
        showToast('Lista vaciada');
    }
});

document.getElementById('toggleBoughtBtn').addEventListener('click', () => {

    hideBought = !hideBought;

    renderList();

    showToast(
        hideBought
        ? 'Comprados ocultos'
        : 'Comprados visibles'
    );

});

document
.getElementById('fabButton')
.addEventListener('click', () => {

    itemInput.focus();

    window.scrollTo({
        top:0,
        behavior:'smooth'
    });

});

document.getElementById('shareBtn').addEventListener('click', openShareModal);

copyShareBtn.addEventListener('click', async () => {
    const text = sharePreview.value || buildWhatsappMessage();
    try {
        await navigator.clipboard.writeText(text);
        showToast('Texto copiado');
    } catch {
        sharePreview.select();
        document.execCommand('copy');
        showToast('Texto copiado');
    }
});

openWhatsappBtn.addEventListener('click', () => {
    const text = sharePreview.value || buildWhatsappMessage();
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
});

closeShareBtn.addEventListener('click', closeShareModalView);
closeShareModal.addEventListener('click', closeShareModalView);

shareModal.addEventListener('click', (e) => {
    if(e.target === shareModal){
        closeShareModalView();
    }
});

window.addEventListener('keydown', (e) => {
    if(e.key === 'Escape'){
        closeShareModalView();
    }
});

document.getElementById('exportBtn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'lista_super_familiar.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Copia guardada');
});

document.getElementById('importFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
        try {
            const data = JSON.parse(evt.target.result);
            if(!Array.isArray(data)) throw new Error();
            items = data.map(item => ({
                name: String(item.name || '').trim(),
                type: item.type === 'libras' ? 'libras' : 'unidades',
                price: item.price === '' || item.price == null ? '' : Number(item.price),
                quantity: item.quantity === '' || item.quantity == null ? '' : Number(item.quantity),
                bought: Boolean(item.bought)
            })).filter(item => item.name);
            renderList();
            showToast('Lista cargada con éxito');
        } catch {
            showToast('Archivo no válido');
        }
    };
    reader.readAsText(file);
});

if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js').catch(() => {
            console.warn('No se pudo registrar el service worker');
        });
    });
}

let deferredPrompt;

window.addEventListener(
    'beforeinstallprompt',
    (e) => {

        e.preventDefault();

        deferredPrompt = e;

        installBtn.style.display = 'block';

        showToast('📲 Puedes instalar la app');

    }
);

installBtn.addEventListener('click', async () => {
    if(!deferredPrompt) return;

    deferredPrompt.prompt();
    const choice = await deferredPrompt.userChoice;

    if(choice.outcome === 'accepted'){
        showToast('Instalación iniciada');
    }

    deferredPrompt = null;
    installBtn.style.display = 'none';
});

window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    installBtn.style.display = 'none';
    showToast('App instalada');
});

renderList();
</script>
</body>
</html>
